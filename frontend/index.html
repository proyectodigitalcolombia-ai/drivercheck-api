<!DOCTYPE html>
<html>
<head>

<title>DriverCheck</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
padding:50px;
}

.container{
background:white;
padding:30px;
width:400px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
font-size:16px;
margin-top:10px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#2563eb;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}

#result{
margin-top:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>DriverCheck</h2>

<p>Verificar conductor</p>

<input id="doc" placeholder="Número de documento">

<button onclick="checkDriver()">
Consultar
</button>

<div id="result"></div>

</div>

<script>

async function checkDriver(){

const doc = document.getElementById("doc").value

const res = await fetch(
"https://drivercheck-api-muit.onrender.com/api/drivers/check"
)

const data = await res.json()

document.getElementById("result").innerHTML =
JSON.stringify(data,null,2)

}

</script>

</body>
</html>
